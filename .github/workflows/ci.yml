name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...

  frontend:
    name: Frontend (Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

  docker:
    name: Docker image (amd64 + arm64)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      # QEMU is no longer needed for the build itself (the Dockerfile cross-
      # compiles from the native build platform), but multi-arch buildx still
      # wants an emulator registered for the runtime image layers.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      # Build for both architectures to prove the arm64 (Raspberry Pi) image
      # compiles. Not pushed — release.yml publishes on main and tags.
      # GitHub Actions cache persists the Go/npm build caches between runs.
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          tags: taskrr:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
