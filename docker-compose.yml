services:
  taskrr:
    image: ghcr.io/unmaykr-a/taskrr:latest
    container_name: taskrr
    restart: unless-stopped
    user: "${TASKRR_UID:-1000}:${TASKRR_GID:-1000}"
    ports:
      - "8787:8787"
    env_file:
      - path: .env
        required: false
    environment:
      TASKRR_ADDR: ":8787"
      TASKRR_DB_PATH: "/data/taskrr.db"
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "/taskrr", "-health"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s
